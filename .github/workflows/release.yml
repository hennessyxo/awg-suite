name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Create the release once up front so the build jobs only upload assets
      # (avoids the concurrent create/list race when many matrix jobs run).
      - name: Ensure release exists
        run: |
          notes=$(cat <<'EOF'
          ## Что скачать (RU)

          **🖱️ Приложение (проще всего):**
          - **macOS** — `awg-gui-macos.zip`
          - **Windows** — `awg-gui-windows-amd64.exe`

          **⌨️ Командная строка (для продвинутых):** `awg-deploy-…` для вашей ОС
          (`.tar.gz` для mac/Linux, `.exe` для Windows).

          Остальные файлы (`awg-monitor-…`, `awg-panel-…`) — служебные: их сам
          скачивает установщик на сервер, вручную качать не нужно.

          ---

          ## What to download (EN)

          **🖱️ Desktop app (easiest):**
          - **macOS** — `awg-gui-macos.zip`
          - **Windows** — `awg-gui-windows-amd64.exe`

          **⌨️ Command line (advanced):** `awg-deploy-…` for your OS
          (`.tar.gz` for mac/Linux, `.exe` for Windows).

          The other files (`awg-monitor-…`, `awg-panel-…`) are server-side helpers
          the installer downloads automatically — no need to grab them by hand.
          EOF
          )
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
                 --title "${GITHUB_REF_NAME}" --notes "${notes}"

  server:
    name: Server binaries (linux)
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build static binaries
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w" -o "awg-monitor-linux-${{ matrix.goarch }}" ./cmd/awg-monitor
          go build -ldflags "-s -w" -o "awg-panel-linux-${{ matrix.goarch }}" ./cmd/awg-panel
      - name: Upload
        run: >-
          gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber
          "awg-monitor-linux-${{ matrix.goarch }}" "awg-panel-linux-${{ matrix.goarch }}"

  deploy:
    name: Deploy tool (cross-platform)
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, ext: '' }
          - { goos: linux, goarch: arm64, ext: '' }
          - { goos: windows, goarch: amd64, ext: '.exe' }
          - { goos: darwin, goarch: amd64, ext: '' }
          - { goos: darwin, goarch: arm64, ext: '' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build & package awg-deploy
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          base="awg-deploy-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -ldflags "-s -w" -o "awg-deploy${{ matrix.ext }}" ./cmd/awg-deploy
          # Ship ONE file per platform: a Windows .exe (double-click), or a .tar.gz
          # that preserves the executable bit (no chmod) on mac/linux.
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp "awg-deploy.exe" "${base}.exe"
            echo "ASSET=${base}.exe" >>"$GITHUB_ENV"
          else
            tar -czf "${base}.tar.gz" "awg-deploy"
            echo "ASSET=${base}.tar.gz" >>"$GITHUB_ENV"
          fi
      - name: Upload
        run: >-
          gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber
          "${ASSET}"

  gui:
    name: Desktop GUI
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, platform: darwin/universal, out: awg-gui-macos }
          - { os: windows-latest, platform: windows/amd64, out: awg-gui-windows-amd64 }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: gui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gui/go.mod
          cache-dependency-path: gui/go.sum
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build
        run: wails build -platform ${{ matrix.platform }} -clean
      - name: Package & upload
        run: |
          cd build/bin
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # macOS shows a one-time Gatekeeper warning on first launch. Ship a
            # short bilingual guide with both the Settings and Terminal ways to allow it.
            cat > "Открыть на macOS — How to open (macOS).txt" <<'TXT'
          Как открыть AmneziaWG Manager (macOS)
          =====================================
          При первом запуске macOS показывает предупреждение — это нормально.
          Разрешить нужно один раз, любым способом:

          Способ 1 — через настройки:
            1. Дважды кликните awg-gui.app и закройте предупреждение.
            2. Системные настройки -> «Конфиденциальность и безопасность».
            3. Внизу найдите строку про «awg-gui» и нажмите «Открыть всё равно»,
               затем подтвердите «Открыть».

          Способ 2 — через Терминал (если так привычнее):
            1. Откройте приложение «Терминал».
            2. Наберите это (без кавычек) и поставьте ПРОБЕЛ в конце, но Enter пока НЕ нажимайте:
                 xattr -dr com.apple.quarantine
            3. Перетащите awg-gui.app в окно Терминала — путь подставится сам.
            4. Нажмите Enter. Готово.

          Дальше приложение открывается обычным двойным кликом.


          How to open AmneziaWG Manager (macOS)
          =====================================
          On first launch macOS shows a warning — this is expected.
          You only need to allow it once, either way:

          Option 1 — via Settings:
            1. Double-click awg-gui.app and dismiss the warning.
            2. System Settings -> "Privacy & Security".
            3. Near the bottom find the "awg-gui" line, click "Open Anyway",
               then confirm "Open".

          Option 2 — via Terminal (if you prefer commands):
            1. Open the "Terminal" app.
            2. Type this (without quotes) and add a trailing SPACE, but do NOT press Enter yet:
                 xattr -dr com.apple.quarantine
            3. Drag awg-gui.app into the Terminal window — the path is filled in.
            4. Press Enter. Done.

          After that the app opens with a normal double-click.
          TXT
            guide="Открыть на macOS — How to open (macOS).txt"
            zip -ry "${{ matrix.out }}.zip" awg-gui.app "$guide"
            gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber "${{ matrix.out }}.zip"
          else
            # Windows: a single double-clickable .exe.
            cp awg-gui.exe "${{ matrix.out }}.exe"
            gh release upload "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber "${{ matrix.out }}.exe"
          fi
